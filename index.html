<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photon Core — Photon Studios Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="Photon_Core.png">
    
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <!-- Secret Modal Styles -->
    <link rel="stylesheet" href="secret-modal.css">
    <!-- Auth Guard System (BEFORE other scripts) -->
<link rel="stylesheet" href="auth-guard.css">
<script src="members-list.js"></script>
<script src="auth-guard.js"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        .auth-methods {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 300px;
            margin-top: 24px;
        }
        
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 16px 0;
            color: var(--text-muted, #888);
            font-size: 12px;
        }
        
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color, #2d2d44);
        }
        
        .btn-google {
            background: #fff;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-google:hover {
            background: #f5f5f5;
        }
        
        .btn-google .google-icon {
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #4285F4;
            color: #fff;
            font-weight: 700;
            font-size: 12px;
            line-height: 1;
            flex-shrink: 0;
        }
        
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 300px;
        }
        
        .auth-form input {
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color, #2d2d44);
            background: var(--bg-tertiary, #232340);
            color: var(--text-primary, #fff);
            font-size: 14px;
        }
        
        .auth-form input:focus {
            outline: none;
            border-color: var(--primary, #6c5ce7);
        }
        
        .auth-toggle {
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-muted, #888);
        }
        
        .auth-toggle a {
            color: var(--primary, #6c5ce7);
            cursor: pointer;
            text-decoration: none;
        }
        
        .auth-toggle a:hover {
            text-decoration: underline;
        }
        
        .auth-error {
            color: #ef4444;
            font-size: 13px;
            text-align: center;
            min-height: 20px;
        }

    /* ... existing styles ... */
    
    /* Spinner animation */
    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
    
    /* Shake animation for errors */
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
    }
    
    /* Button disabled state */
    .btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
    }
    
    .btn-google:disabled {
        background: #e0e0e0;
    }
    
    /* Hidden class */
    .hidden {
        display: none !important;
    }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-screen">
        <div class="auth-container">
            <div class="auth-logo">
                <div class="logo-icon">⚡</div>
                <h1>Photon Core</h1>
                <p>Photon Studios Internal Hub</p>
                <p class="auth-note">Authorized members only — Photon Studios</p>
                <p class="auth-warning">⚠️ Only registered team member emails are allowed</p>
            </div>
            
            <!-- Google Sign In (Primary) -->
            <div class="auth-methods">
                <button id="btn-google-signin" class="btn btn-large btn-google">
                    <span class="google-icon" aria-hidden="true">G</span>
                    Sign in with Google
                </button>
            </div>
            
            <div class="auth-divider">or use email</div>
            
            <!-- Email/Password Form -->
            <form id="auth-form" class="auth-form">
                <input type="email" id="auth-email" placeholder="Email" required>
                <input type="password" id="auth-password" placeholder="Password" required minlength="6">
                <input type="text" id="auth-username" placeholder="Display Name (for signup)" class="hidden">
                <p id="auth-error" class="auth-error"></p>
                <button type="submit" id="btn-email-auth" class="btn btn-primary btn-large">Sign In</button>
            </form>
            
            <p class="auth-toggle">
                <span id="auth-toggle-text">Don't have an account?</span>
                <a id="auth-toggle-link" onclick="toggleAuthMode()">Sign Up</a>
            </p>
            
            <p class="auth-note">Authorized members only — Photon Studios</p>
        </div>
        <div class="particles" id="particles"></div>
    </div>

    <div id="app" class="app hidden"></div>
    <div id="toast-container" class="toast-container"></div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="presence.js"></script>
    <script src="discussions.js"></script>
    <script src="files.js"></script>
    <script src="ai.js"></script>
    <script src="ui.js"></script>
    <script src="boot.js"></script>
    <!-- Secret Verification (AFTER other scripts) -->
    <script src="secret-verify.js"></script>
</body>
</html>
