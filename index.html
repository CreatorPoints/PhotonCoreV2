<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photon Core — Photon Studios Hub</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <!-- Secret Modal Styles -->
    <link rel="stylesheet" href="secret-modal.css">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        .auth-methods {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 300px;
            margin-top: 24px;
        }
        
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 16px 0;
            color: var(--text-muted, #888);
            font-size: 12px;
        }
        
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color, #2d2d44);
        }
        
        .btn-google {
            background: #fff;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-google:hover {
            background: #f5f5f5;
        }
        
        .btn-google svg {
            width: 20px;
            height: 20px;
        }
        
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 300px;
        }
        
        .auth-form input {
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color, #2d2d44);
            background: var(--bg-tertiary, #232340);
            color: var(--text-primary, #fff);
            font-size: 14px;
        }
        
        .auth-form input:focus {
            outline: none;
            border-color: var(--primary, #6c5ce7);
        }
        
        .auth-toggle {
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-muted, #888);
        }
        
        .auth-toggle a {
            color: var(--primary, #6c5ce7);
            cursor: pointer;
            text-decoration: none;
        }
        
        .auth-toggle a:hover {
            text-decoration: underline;
        }
        
        .auth-error {
            color: #ef4444;
            font-size: 13px;
            text-align: center;
            min-height: 20px;
        }

        <style>
    /* ... existing styles ... */
    
    /* Spinner animation */
    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
    
    /* Shake animation for errors */
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
    }
    
    /* Button disabled state */
    .btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
    }
    
    .btn-google:disabled {
        background: #e0e0e0;
    }
    
    /* Hidden class */
    .hidden {
        display: none !important;
    }
</style>
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-screen">
        <div class="auth-container">
            <div class="auth-logo">
                <div class="logo-icon">⚡</div>
                <h1>Photon Core</h1>
                <p>Photon Studios Internal Hub</p>
            </div>
            
            <!-- Google Sign In (Primary) -->
            <div class="auth-methods">
                <button id="btn-google-signin" class="btn btn-large btn-google">
                    <svg viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Sign in with Google
                </button>
            </div>
            
            <div class="auth-divider">or use email</div>
            
            <!-- Email/Password Form -->
            <form id="auth-form" class="auth-form">
                <input type="email" id="auth-email" placeholder="Email" required>
                <input type="password" id="auth-password" placeholder="Password" required minlength="6">
                <input type="text" id="auth-username" placeholder="Display Name (for signup)" class="hidden">
                <p id="auth-error" class="auth-error"></p>
                <button type="submit" id="btn-email-auth" class="btn btn-primary btn-large">Sign In</button>
            </form>
            
            <p class="auth-toggle">
                <span id="auth-toggle-text">Don't have an account?</span>
                <a id="auth-toggle-link" onclick="toggleAuthMode()">Sign Up</a>
            </p>
            
            <p class="auth-note">Authorized members only — Photon Studios</p>
        </div>
        <div class="particles" id="particles"></div>
    </div>

    <div id="app" class="app hidden"></div>
    <div id="toast-container" class="toast-container"></div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="presence.js"></script>
    <script src="discussions.js"></script>
    <script src="files.js"></script>
    <script src="ai.js"></script>
    <script src="ui.js"></script>
    <script src="boot.js"></script>
    <!-- Secret Verification (AFTER other scripts) -->
    <script src="secret-verify.js"></script>
</body>
</html>
