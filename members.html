<!DOCTYPE html>
<html lang="en">
<head>
     <!-- Secret Guard - MUST be first script, blocks rendering -->
    <script src="secret-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members — Photon Core</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="Photon_Core.png">
    <!-- Firebase - ALL 5 SCRIPTS -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div id="app" class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-small">⚡</div>
                <span class="logo-text">Photon Core</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item" data-tab="dashboard"><span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span></a>
                <a href="discussions.html" class="nav-item" data-tab="discussions"><span class="nav-icon">💬</span><span class="nav-label">Discussions</span></a>
                <a href="files.html" class="nav-item" data-tab="files"><span class="nav-icon">📁</span><span class="nav-label">Files</span></a>
                <a href="ai.html" class="nav-item" data-tab="ai"><span class="nav-icon">🤖</span><span class="nav-label">AI Assistant</span></a>
                <a href="members.html" class="nav-item active" data-tab="members"><span class="nav-icon">👥</span><span class="nav-label">Members</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">?</div>
                    <div class="user-details">
                        <span class="user-name" id="user-name">Loading...</span>
                        <span class="user-role">Member</span>
                    </div>
                </div>
                <button id="btn-sign-out" class="btn-icon" title="Sign Out">🚪</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button id="mobile-menu-btn" class="btn-icon mobile-only">☰</button>
                    <h2 id="page-title">Members</h2>
                </div>
                <div class="header-right">
                    <div class="online-count-badge">
                        <span class="status-dot online"></span>
                        <span id="online-count">0</span> online
                    </div>
                </div>
            </header>

            <div class="content-area">
                <section id="tab-members" class="tab-content active">
                    <div class="tab-header">
                        <h2>👥 Team Members</h2>
                        <p>Live status — see who's online right now.</p>
                    </div>
                    <div class="members-grid" id="members-grid">
                        <div class="empty-state"><span class="empty-icon">👥</span><p>Loading members...</p></div>
                    </div>
                    <div class="card member-settings">
                        <h3>⚙️ Your Profile</h3>
                        <div class="profile-form">
                            <div class="form-group">
                                <label>Display Name</label>
                                <input type="text" id="profile-name" class="input" placeholder="Your name">
                            </div>
                            <div class="form-group">
                                <label>Role</label>
                                <select id="profile-role" class="select">
                                    <option value="💻 Developer">💻 Developer</option>
                                    <option value="🎨 Artist">🎨 Artist</option>
                                    <option value="🎮 Game Designer">🎮 Game Designer</option>
                                    <option value="🎵 Sound Designer">🎵 Sound Designer</option>
                                    <option value="✍️ Writer">✍️ Writer</option>
                                    <option value="📋 Producer">📋 Producer</option>
                                    <option value="⭐ Team Lead">⭐ Team Lead</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Status Message</label>
                                <input type="text" id="profile-status" class="input" placeholder="What are you working on?">
                            </div>
                            <button id="btn-save-profile" class="btn btn-primary">Save Profile</button>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div id="toast-container" class="toast-container"></div>

     <script src="members-list.js"></script>
<script src="auth-guard.js"></script>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="presence.js"></script>
    <script src="discussions.js"></script>
    <script src="files.js"></script>
    <script src="ai.js"></script>
    <script src="ui.js"></script>
    <script src="boot.js"></script>
</body>
</html>
